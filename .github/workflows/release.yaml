name: 🚀 Release
run-name: Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (YYYY.MM.bb)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]{4}\.(0[1-9]|1[0-2])\.(0[1-9]|[1-9][0-9])$ ]]; then
            echo "❌ Invalid version format: ${{ inputs.version }}. Expected YYYY.MM.bb"
            exit 1
          fi
          echo "✅ Version format is valid: ${{ inputs.version }}"

      - name: Verify versions match input
        run: |
          PROPS_VERSION=$(grep '^version=' library.properties | cut -d'=' -f2)
          JSON_VERSION=$(jq -r '.version' library.json)

          if [ "$PROPS_VERSION" != "${{ inputs.version }}" ]; then
            echo "❌ library.properties version ($PROPS_VERSION) does not match release input (${{ inputs.version }})"
            exit 1
          fi

          if [ "$JSON_VERSION" != "${{ inputs.version }}" ]; then
            echo "❌ library.json version ($JSON_VERSION) does not match release input (${{ inputs.version }})"
            exit 1
          fi

          echo "✅ Both library files match ${{ inputs.version }}"

      - name: Tag and push
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
