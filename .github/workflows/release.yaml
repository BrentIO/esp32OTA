name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (YYYY.MM.DD)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Update version in library files
        run: |
          sed -i "s/^version=.*/version=${{ inputs.version }}/" library.properties
          sed -i 's/"version": ".*"/"version": "${{ inputs.version }}"/' library.json

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add library.properties library.json
          git commit -m "Release ${{ inputs.version }}"
          git push origin main

      - name: Tag and push
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            library.json
            library.properties
