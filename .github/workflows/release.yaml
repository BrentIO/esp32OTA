name: 🚀 Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (YYYY.MM.DD)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - name: Verify versions match input
        run: |
          PROPS_VERSION=$(grep '^version=' library.properties | cut -d'=' -f2)
          JSON_VERSION=$(grep '"version"' library.json | sed 's/.*"version": "\(.*\)".*/\1/')

          if [ "$PROPS_VERSION" != "${{ inputs.version }}" ]; then
            echo "❌ library.properties version ($PROPS_VERSION) does not match release input (${{ inputs.version }})"
            exit 1
          fi

          if [ "$JSON_VERSION" != "${{ inputs.version }}" ]; then
            echo "❌ library.json version ($JSON_VERSION) does not match release input (${{ inputs.version }})"
            exit 1
          fi

          echo "✅ Both library files match ${{ inputs.version }}"

      - name: Tag and push
        run: |
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.version }}
          generate_release_notes: true
          files: |
            library.json
            library.properties
